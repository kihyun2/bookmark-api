name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: bookmark_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Prisma migrate
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/bookmark_test

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 및 push
        run: |
          docker build -t kihyun1232/bookmark-api:${{ github.sha }} .
          docker push kihyun1232/bookmark-api:${{ github.sha }}
          docker tag kihyun1232/bookmark-api:${{ github.sha }} kihyun1232/bookmark-api:latest
          docker push kihyun1232/bookmark-api:latest

      - name: 이미지 태그 업데이트 (ArgoCD용)
        run: |
          sed -i "s|image: kihyun1232/bookmark-api:.*|image: kihyun1232/bookmark-api:${{ github.sha }}|" k8s/deployment.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update image tag to ${{ github.sha }}"
          git push
