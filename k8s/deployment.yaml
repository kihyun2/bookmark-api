apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookmark-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookmark-api
  template:
    metadata:
      labels:
        app: bookmark-api
    spec:
      initContainers:
        - name: migrate
          image: kihyun1232/bookmark-api:efbece3dbf1822e3cec17cb07fe7fbcedcdabea7
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bookmark-secret
                  key: DATABASE_URL
      containers:
        - name: app
          image: kihyun1232/bookmark-api:efbece3dbf1822e3cec17cb07fe7fbcedcdabea7
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bookmark-secret
                  key: DATABASE_URL
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.default.svc.cluster.local:4318/v1/traces"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10